<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#090716">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Empire Eternal">
  <meta name="description" content="Bâtis ta citadelle, commande tes héros et fracture le temps pour sauver ton royaume.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
  <title>Empire Eternal — La Fracture</title>
</head>
<body>
  <canvas id="game" aria-label="Empire Eternal"></canvas>

  <div id="appUI">
    <header id="topbar">
      <button id="profileBtn" class="iconButton" aria-label="Profil"><span id="levelBadge">1</span></button>
      <div class="brand"><small>EMPIRE</small><strong>ETERNAL</strong></div>
      <div class="resources">
        <span title="Or">🪙 <b id="gold">0</b></span>
        <span title="Éther">✦ <b id="aether">0</b></span>
        <span title="Énergie">⚡ <b id="energy">0</b></span>
      </div>
      <button id="questsBtn" class="iconButton questButton" aria-label="Quêtes">📜<i id="questDot"></i></button>
    </header>

    <div id="sceneTitle" aria-live="polite">
      <small id="sceneEyebrow">CITADELLE D'ASTRA</small>
      <strong id="sceneName">Votre royaume</strong>
    </div>

    <div id="battleHUD" class="hidden">
      <div class="battleSide ally"><span>VOTRE ESCOUADE</span><b id="allyCount">3</b></div>
      <div class="battleTimer"><span id="waveLabel">VAGUE 1/2</span><b id="battleTime">0:00</b></div>
      <div class="battleSide enemy"><span>ENNEMIS</span><b id="enemyCount">0</b></div>
    </div>

    <div id="combatActions" class="hidden" aria-label="Compétences de combat">
      <button class="skill" data-skill="bulwark"><span class="skillIcon">🛡️</span><b>BASTION</b><small>bouclier</small><i class="cooldown"></i></button>
      <button class="skill" data-skill="volley"><span class="skillIcon">🏹</span><b>VOLÉE</b><small>zone</small><i class="cooldown"></i></button>
      <button class="skill" data-skill="nova"><span class="skillIcon">🔮</span><b>NOVA</b><small>ralentit</small><i class="cooldown"></i></button>
      <div id="comboMeter"><span>COMBO</span><b>x1</b></div>
    </div>

    <nav id="bottomNav" aria-label="Navigation principale">
      <button data-scene="base" class="active"><span>🏰</span><b>Citadelle</b></button>
      <button data-scene="map"><span>🗺️</span><b>Campagne</b><i id="mapDot"></i></button>
      <button data-scene="heroes"><span>🛡️</span><b>Héros</b></button>
      <button data-scene="portal"><span>✦</span><b>Portail</b></button>
    </nav>
  </div>

  <div id="sheetBackdrop" class="hidden"></div>
  <section id="sheet" class="hidden" role="dialog" aria-modal="true">
    <div class="grabber"></div>
    <button id="sheetClose" aria-label="Fermer">×</button>
    <div id="sheetContent"></div>
  </section>

  <div id="timingEvent" class="hidden">
    <div class="timingVignette"></div>
    <div class="timingCopy">
      <small>LA FRACTURE S'OUVRE</small>
      <h2>FRAPPE TEMPORELLE</h2>
      <p>Touche quand les deux anneaux se rencontrent.</p>
    </div>
    <div id="timingTarget"><i id="timingRing"></i><b>TOUCHER</b></div>
    <div id="timingGrade"></div>
  </div>

  <div id="resultScreen" class="hidden">
    <div class="resultCard">
      <small id="resultKicker">MISSION ACCOMPLIE</small>
      <h1 id="resultTitle">VICTOIRE</h1>
      <div id="resultStars">☆☆☆</div>
      <p id="resultSummary"></p>
      <div id="resultLoot"></div>
      <button id="resultContinue" class="primaryButton">CONTINUER</button>
    </div>
  </div>

  <div id="offlineReward" class="hidden">
    <div class="offlineCard">
      <span>🌙</span><small>VOTRE ROYAUME A TRAVAILLÉ</small>
      <h2>Vous voilà de retour</h2>
      <p id="offlineText"></p>
      <button id="offlineClaim" class="primaryButton">RÉCUPÉRER</button>
    </div>
  </div>

  <div id="toast" role="status"></div>
  <div id="flash"></div>
  <button id="installBtn" class="hidden">＋ Installer l’app</button>

  <script src="game.js" defer></script>
</body>
</html>
